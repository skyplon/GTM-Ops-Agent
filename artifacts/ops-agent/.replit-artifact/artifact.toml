kind = "web"
previewPath = "/"
title = "OpsAgent — GTM Planning Automation"
version = "1.0.0"
id = "artifacts/ops-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20049

[services.development]
run = "pnpm --filter @workspace/ops-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ops-agent", "run", "build" ]
publicDir = "artifacts/ops-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20049"
BASE_PATH = "/"
